services:
  # 🟢 THE JUDGE (Servant)
  green-agent:
    build:
      context: .
      dockerfile: Dockerfile.green
    ports:
      - "5000:5000"
    volumes:
      - ./replays:/app/replays
      - ./logs:/app/logs
      - ./results:/app/results
      - ./match_records:/app/match_records

  # 🟣 THE PLAYER (Client)
  purple-agent:
    build:
      context: .
      dockerfile: Dockerfile.purple
    environment:
      # Pass your local API key to the containe
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      # It tells the agent where the server (Docker service name) is located.
      - SERVER_URL=http://green-agent:5000
    depends_on:
      - green-agent
    # If it fails to connect, try again (useful while the server is starting up)
    restart: on-failure
